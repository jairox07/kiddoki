services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiddoki
      POSTGRES_PASSWORD: kiddoki_dev
      POSTGRES_DB: kiddoki
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
